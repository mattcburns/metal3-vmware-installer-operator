# This rule is not used by the project vmware-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the vmware.vmware.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vmware-operator
    app.kubernetes.io/managed-by: kustomize
  name: vmwareprovisioner-editor-role
rules:
- apiGroups:
  - vmware.vmware.io
  resources:
  - vmwareprovisioners
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - vmware.vmware.io
  resources:
  - vmwareprovisioners/status
  verbs:
  - get
