# This rule is not used by the project vmware-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to vmware.vmware.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vmware-operator
    app.kubernetes.io/managed-by: kustomize
  name: vmwareprovisioner-viewer-role
rules:
- apiGroups:
  - vmware.vmware.io
  resources:
  - vmwareprovisioners
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - vmware.vmware.io
  resources:
  - vmwareprovisioners/status
  verbs:
  - get
