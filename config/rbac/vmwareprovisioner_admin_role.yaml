# This rule is not used by the project vmware-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over vmware.vmware.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vmware-operator
    app.kubernetes.io/managed-by: kustomize
  name: vmwareprovisioner-admin-role
rules:
- apiGroups:
  - vmware.vmware.io
  resources:
  - vmwareprovisioners
  verbs:
  - '*'
- apiGroups:
  - vmware.vmware.io
  resources:
  - vmwareprovisioners/status
  verbs:
  - get
